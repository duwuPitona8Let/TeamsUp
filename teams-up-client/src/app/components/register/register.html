<div class="register-container">
  <div class="card">
    <h2>Регистрация</h2>

    @if (error()) {
      <div class="alert alert-danger">{{ error() }}</div>
    }

    <form (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="name">Имя</label>
        <input
          type="text"
          id="name"
          class="form-control"
          [(ngModel)]="name"
          name="name"
          required
          [disabled]="loading()"
        />
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input
          type="email"
          id="email"
          class="form-control"
          [(ngModel)]="email"
          name="email"
          required
          [disabled]="loading()"
        />
      </div>

      <div class="form-group">
        <label for="password">Пароль</label>
        <input
          type="password"
          id="password"
          class="form-control"
          [(ngModel)]="password"
          name="password"
          required
          minlength="6"
          [disabled]="loading()"
        />
      </div>

      <div class="form-group">
        <label for="confirmPassword">Подтверждение пароля</label>
        <input
          type="password"
          id="confirmPassword"
          class="form-control"
          [(ngModel)]="confirmPassword"
          name="confirmPassword"
          required
          [disabled]="loading()"
        />
      </div>

      <button type="submit" class="btn btn-primary" [disabled]="loading()">
        @if (loading()) {
          <span class="spinner"></span>
        }
        Зарегистрироваться
      </button>
    </form>

    <p class="mt-3">Уже есть аккаунт? <a routerLink="/login">Войти</a></p>
  </div>
</div>
