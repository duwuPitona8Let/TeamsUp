<div class="login-container">
  <div class="card">
    <h2>Вход</h2>

    @if (error()) {
      <div class="alert alert-danger">{{ error() }}</div>
    }

    <form (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="email">Email</label>
        <input
          type="email"
          id="email"
          class="form-control"
          [(ngModel)]="email"
          name="email"
          required
          [disabled]="loading()"
        />
      </div>

      <div class="form-group">
        <label for="password">Пароль</label>
        <input
          type="password"
          id="password"
          class="form-control"
          [(ngModel)]="password"
          name="password"
          required
          [disabled]="loading()"
        />
      </div>

      <button type="submit" class="btn btn-primary" [disabled]="loading()">
        @if (loading()) {
          <span class="spinner"></span>
        }
        Войти
      </button>
    </form>

    <p class="mt-3">Нет аккаунта? <a routerLink="/register">Зарегистрироваться</a></p>
  </div>
</div>
